<!DOCTYPE html>
<html>
<body>
  <h2>SSE Notifications — User 123</h2>
  <ul id="events"></ul>

  <script>
    const userId = '123';
    const storageKey = `lastEventId_${userId}`;

    function connect() {
      const lastEventId = localStorage.getItem(storageKey);

      const url = lastEventId
        ? `http://localhost:3000/notifications?userId=${userId}&lastEventId=${lastEventId}`
        : `http://localhost:3000/notifications?userId=${userId}`;

      const eventSource = new EventSource(url);

      eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);

    
        if (data.id) {
          localStorage.setItem(storageKey, data.id);
        }

        const li = document.createElement('li');
        li.textContent = `${data.timestamp} — ${data.message}`;
        document.getElementById('events').appendChild(li);
      };

      eventSource.onerror = () => {
        console.log('SSE connection error - reconnecting...');
      };
    }

    connect();
  </script>
</body>
</html>
